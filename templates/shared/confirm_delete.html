{% extends "base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="form-card p-4 p-lg-5">
        <span class="list-chip">Confirmacao</span>
        <h1 class="h3 fw-bold mt-3">Confirmar exclusao</h1>
        <p class="text-muted">Essa acao remove o registro selecionado da tenant ativa.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button class="btn btn-danger"><i class="bi bi-trash3 me-2"></i>Excluir</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
